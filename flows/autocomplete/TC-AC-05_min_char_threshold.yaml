# ─────────────────────────────────────────────────────────────────────────────
# TC-AC-05 | Minimum 2-character threshold before autocomplete fires
#
# Gherkin ref : @TC-AC-05 in autocomplete.feature
# Tags        : autocomplete
#
# What this tests:
#   - Typing a single character ("L") does NOT show the dropdown
#   - Adding a second character ("Lo") triggers the dropdown
#
# Async handling:
#   After typing a single character we wait a generous 1.5 s to give the app
#   a fair chance to fire autocomplete if it incorrectly has no threshold.
#   Then we assert the dropdown is NOT visible.
# ─────────────────────────────────────────────────────────────────────────────

appId: ${MAESTRO_APP_ID}
name: "TC-AC-05 – Minimum 2-character threshold before autocomplete fires"
tags:
  - autocomplete
---

# ── Setup ────────────────────────────────────────────────────────────────────
- runFlow: "../subflows/00_launch_app.yaml"

# ── Step 1: Type a single character ─────────────────────────────────────────
- tapOn:
    id: "city-search-input"
- waitForAnimationToEnd:
    timeout: 600
- inputText: "L"

# Give the app 1.5 s to incorrectly show autocomplete (it should NOT)
- extendedWaitUntil:
    notVisible:
      id: "autocomplete-dropdown"
    timeout: 1500

# ── Assertion 1: Dropdown is NOT visible with a single character ─────────────
- assertNotVisible:
    id: "autocomplete-dropdown"

# ── Screenshot A ─────────────────────────────────────────────────────────────
- takeScreenshot: "TC-AC-05_single_char_no_dropdown"

# ── Step 2: Type a second character ─────────────────────────────────────────
- inputText: "o"

# ── Assertion 2: Dropdown IS visible after 2 characters ─────────────────────
- extendedWaitUntil:
    visible:
      id: "autocomplete-dropdown"
    timeout: 3000

# ── Screenshot B ─────────────────────────────────────────────────────────────
- takeScreenshot: "TC-AC-05_two_chars_dropdown_visible"
