# ─────────────────────────────────────────────────────────────────────────────
# TC-EC-06 | App backgrounded and resumed within 30 s shows cached results
#
# Gherkin ref : @TC-EC-13 in edge_cases.feature
# Tags        : edge-cases
#
# What this tests:
#   - Results are loaded for Nairobi
#   - User presses Home (sends app to background)
#   - After a short wait, user returns to the app
#   - Results are still displayed (not lost, not blank, not crashed)
#
# Maestro commands:
#   pressKey: Home   → sends the app to the background (both platforms)
#   launchApp        → brings the app back to foreground (without clearState)
# ─────────────────────────────────────────────────────────────────────────────

appId: ${MAESTRO_APP_ID}
name: "TC-EC-06 – App backgrounded and resumed shows cached results"
tags:
  - edge-cases
---

# ── Setup ────────────────────────────────────────────────────────────────────
- runFlow: "../subflows/00_launch_app.yaml"

# ── Step 1: Load ranking results ─────────────────────────────────────────────
- runFlow:
    file: "../subflows/00_search_and_select_city.yaml"
    env:
      CITY_PREFIX: "Nai"
      CITY_NAME: "Nairobi, Kenya"
- runFlow: "../subflows/00_wait_for_results.yaml"

# Confirm results are on screen before going to background
- assertVisible:
    id: "results-container"

# ── Screenshot A: Results before backgrounding ────────────────────────────────
- takeScreenshot: "TC-EC-06_results_before_background"

# ── Step 2: Send app to background ──────────────────────────────────────────────
# pressKey: Home sends the device to the home screen without killing the app
- pressKey: Home

# Wait for the home screen to fully render before returning to the app.
# We use extendedWaitUntil on a system element rather than a fixed sleep.
# This correctly waits for the OS home screen — not app animations —
# and exits as soon as the condition is met rather than waiting the full 3 s.
#
# Note: the 5-minute background scenario from TC-EC-14 (Gherkin) is explicitly
# excluded from automation — a 5-minute pause would make CI runtimes
# unacceptable. That case is covered by TC-12 in the manual test script.
- extendedWaitUntil:
    notVisible:
      id: "city-search-input"
    timeout: 3000

# ── Step 3: Return to the app ────────────────────────────────────────────────
# launchApp without clearState: true brings the existing instance back
- launchApp

# Wait for any resume animation
- waitForAnimationToEnd:
    timeout: 1000

# ── Assertion 1: App has not crashed – results container is visible ───────────
- assertVisible:
    id: "results-container"

# ── Assertion 2: Day cards are still rendered (no blank screen) ───────────────
- assertVisible:
    id: "day-card"

# ── Assertion 3: Loading indicator is NOT spinning (no unexpected re-fetch) ───
- assertNotVisible:
    id: "loading-indicator"

# ── Screenshot B: Results after resume ────────────────────────────────────────
- takeScreenshot: "TC-EC-06_results_after_resume"
